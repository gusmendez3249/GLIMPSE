<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background: transparent;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .notification {
            width: 400px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(500px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification-header {
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .notification-title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.8;
            padding: 0;
            width: 24px;
            height: 24px;
        }

        .close-btn:hover {
            opacity: 1;
        }

        .notification-body {
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .message {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
            word-wrap: break-word;
        }

        .copy-hint {
            margin-top: 15px;
            padding: 10px;
            background: #f0f9ff;
            border-left: 3px solid #3b82f6;
            font-size: 12px;
            color: #1e40af;
        }
    </style>
</head>
<body>
    <div class="notification">
        <div class="notification-header">
            <div class="notification-title">
                <span>✨</span>
                <span>GLIMPSE - Respuesta</span>
            </div>
            <button class="close-btn" onclick="closeNotification()">✕</button>
        </div>
        <div class="notification-body">
            <div class="message" id="message"></div>
            <div class="copy-hint">
                📋 Respuesta copiada al portapapeles • Ctrl+V para pegar
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const message = document.getElementById('message');

        ipcRenderer.on('show-notification', (event, data) => {
            message.textContent = data.response;
        });

        function closeNotification() {
            ipcRenderer.send('close-notification');
        }
    </script>
</body>
</html>
